{% set name = "openslide-python" %}
{% set version = "1.4.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 06eec2e05988c37b71ff1ee57d1f465c0dcbf26e655d1dcdab70217ad2769b82

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - python  # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - setuptools
  host:
    - pip
    - python
    - openslide
    - setuptools
  run:
    - pillow
    - python
    - openslide
    - setuptools

test:
  imports:
    - openslide

about:
  home: https://openslide.org/
  license: LGPL-2.1-only
  license_family: LGPL
  license_file: COPYING.LESSER
  summary: Python interface to OpenSlide

extra:
  recipe-maintainers:
    - sarthakpati
